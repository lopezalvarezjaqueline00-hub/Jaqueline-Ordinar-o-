<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f8d7da;
        }
        .container {
            max-width: 350px;
            margin: auto;
            padding: 20px;
            background: white;
            border: 1px solid #d8000c;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }
        h2 {
            color: #d8000c;
        }
        p {
            margin: 10px 0;
        }
        button{
            background: #d8000c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #b30000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Error</h2>
        <p id="error-msg"></p>
        <button onclick="window.location.href='/'">Go Back</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('error-msg').textContent = params.get('msg') || 'An unknown error occurred.';
    </script>

</body>
</html>
